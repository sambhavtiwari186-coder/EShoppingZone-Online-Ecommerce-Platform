services:
  gateway:
    build:
      context: ./EShoppingZone.Gateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      - profile-api
      - product-api
      - cart-api
      - order-api
      - wallet-api
      - review-api
      - notify-api

  profile-api:
    build:
      context: ./EShoppingZone.Profile.API
    environment:
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - profile-data:/app/data
    # Use environment to override SQLite path if needed, but default is fine

  product-api:
    build:
      context: ./EShoppingZone.Product.API
    environment:
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - product-data:/app/data

  cart-api:
    build:
      context: ./EShoppingZone.Cart.API
    environment:
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - cart-data:/app/data

  order-api:
    build:
      context: ./EShoppingZone.Orders.API
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Services__ProductAPI=http://product-api:8080
      - Services__CartAPI=http://cart-api:8080
      - Services__WalletAPI=http://wallet-api:8080
      - Services__NotifyAPI=http://notify-api:8080
    volumes:
      - order-data:/app/data

  wallet-api:
    build:
      context: ./EShoppingZone.Wallet.API
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Services__NotifyAPI=http://notify-api:8080
    volumes:
      - wallet-data:/app/data

  review-api:
    build:
      context: ./EShoppingZone.Review.API
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Services__OrderAPI=http://order-api:8080
    volumes:
      - review-data:/app/data

  notify-api:
    build:
      context: ./EShoppingZone.Notify.API
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=notify.db
    volumes:
      - notify-data:/app/data

volumes:
  profile-data:
  product-data:
  cart-data:
  order-data:
  wallet-data:
  review-data:
  notify-data:
