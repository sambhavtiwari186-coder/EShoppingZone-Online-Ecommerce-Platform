services:
  # API Gateway
  - type: web
    name: gateway
    env: docker
    dockerContext: ./EShoppingZone.Gateway
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Docker
      - key: AllowedHosts
        value: "*"
        
  # Profile API
  - type: web
    name: profile-api
    env: docker
    dockerContext: ./EShoppingZone.Profile.API
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: "Data Source=/app/data/profile.db"
    disk:
      name: profile-data
      mountPath: /app/data
      sizeGB: 1
      
  # Product API
  - type: web
    name: product-api
    env: docker
    dockerContext: ./EShoppingZone.Product.API
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: "Data Source=/app/data/product.db"
    disk:
      name: product-data
      mountPath: /app/data
      sizeGB: 1

  # Cart API
  - type: web
    name: cart-api
    env: docker
    dockerContext: ./EShoppingZone.Cart.API
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: "Data Source=/app/data/cart.db"
    disk:
      name: cart-data
      mountPath: /app/data
      sizeGB: 1

  # Orders API
  - type: web
    name: order-api
    env: docker
    dockerContext: ./EShoppingZone.Orders.API
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: "Data Source=/app/data/orders.db"
      - key: Services__ProductAPI
        value: http://product-api:8080
      - key: Services__CartAPI
        value: http://cart-api:8080
      - key: Services__WalletAPI
        value: http://wallet-api:8080
      - key: Services__NotifyAPI
        value: http://notify-api:8080
    disk:
      name: order-data
      mountPath: /app/data
      sizeGB: 1

  # Wallet API
  - type: web
    name: wallet-api
    env: docker
    dockerContext: ./EShoppingZone.Wallet.API
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: "Data Source=/app/data/wallet.db"
      - key: Services__NotifyAPI
        value: http://notify-api:8080
    disk:
      name: wallet-data
      mountPath: /app/data
      sizeGB: 1

  # Review API
  - type: web
    name: review-api
    env: docker
    dockerContext: ./EShoppingZone.Review.API
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: "Data Source=/app/data/reviews.db"
      - key: Services__OrderAPI
        value: http://order-api:8080
    disk:
      name: review-data
      mountPath: /app/data
      sizeGB: 1

  # Notify API
  - type: web
    name: notify-api
    env: docker
    dockerContext: ./EShoppingZone.Notify.API
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: "Data Source=/app/data/notify.db"
      - key: RabbitMQ__Host
        value: rabbitmq
    disk:
      name: notify-data
      mountPath: /app/data
      sizeGB: 1

  # RabbitMQ Broker (using custom Dockerfile in root)
  - type: pserv
    name: rabbitmq
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.rabbitmq
    disk:
      name: rabbitmq-data
      mountPath: /var/lib/rabbitmq
      sizeGB: 1
